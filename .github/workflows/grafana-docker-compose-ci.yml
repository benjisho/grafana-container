name: CI for Grafana Container

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '.gitignore'
      - '*.md'
      - 'LICENSE'
      - 'useful-scripts/install_docker_debian.sh'
      - 'useful-scripts/install_docker_ubuntu.sh'
      - 'certs/*'

  pull_request:
    paths-ignore:
      - '.gitignore'
      - '*.md'
      - 'LICENSE'
      - 'useful-scripts/install_docker_debian.sh'
      - 'useful-scripts/install_docker_ubuntu.sh'
      - 'certs/*'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run behavior tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Generate SSL/TLS certificates
        run: |
          mkdir -p certs
          openssl genrsa -out certs/server.key 2048
          openssl req -new -key certs/server.key -out certs/server.csr -subj "/CN=localhost"
          openssl x509 -req -days 365 -in certs/server.csr -signkey certs/server.key -out certs/server.crt

      - name: Validate compose configuration
        run: docker compose config

      - name: Start services
        run: docker compose up -d

      - name: Check if containers are running
        run: docker ps -a

      - name: Check docker-compose logs
        run: docker compose logs

      - name: Wait for Grafana and Nginx health checks
        run: |
          set -euo pipefail
          timeout_secs=180
          interval_secs=5
          elapsed=0

          while [ "$elapsed" -lt "$timeout_secs" ]; do
            grafana_container="$(docker compose ps -q grafana)"
            nginx_container="$(docker compose ps -q nginx)"

            if [ -z "$grafana_container" ] || [ -z "$nginx_container" ]; then
              echo "Waiting for containers to be created..."
            else
              grafana_health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$grafana_container")"
              nginx_health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$nginx_container")"

              echo "grafana health: $grafana_health"
              echo "nginx health: $nginx_health"

              if [ "$grafana_health" = "healthy" ] && [ "$nginx_health" = "healthy" ]; then
                echo "Grafana and Nginx are healthy."
                exit 0
              fi
            fi

            sleep "$interval_secs"
            elapsed=$((elapsed + interval_secs))
          done

          echo "Timed out after ${timeout_secs}s waiting for Grafana and Nginx to become healthy."
          docker compose ps
          docker compose logs
          exit 1

      - name: Verify Nginx configuration (gating)
        run: docker compose run --rm nginx nginx -t

      - name: Probe Nginx HTTPS endpoint (gating)
        run: |
          curl --fail --show-error --retry 10 --retry-delay 10 --retry-connrefused --insecure https://localhost

      - name: Probe Grafana HTTP endpoint (gating)
        run: |
          curl --fail --show-error --retry 5 --retry-delay 5 --retry-connrefused http://localhost:3000

      - name: Dump docker-compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop and remove services
        if: always()
        run: docker compose down -v --remove-orphans
