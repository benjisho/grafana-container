services:
  grafana:
    image: grafana/grafana:12.0.1-ubuntu
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_SERVER_DOMAIN: ${NGINX_SERVER_NAME:-localhost}
      GF_SERVER_ROOT_URL: https://${NGINX_SERVER_NAME:-localhost}
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27.5-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      grafana:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  grafana-storage: {}
